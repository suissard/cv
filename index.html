<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clavier.dev | Automatisation IA & Applications Web sur-mesure</title>
  <meta name="description"
    content="Indépendants, artisans, PME : automatisez vos tâches administratives avec l'IA. Zéro oubli, moins de paperasse, plus de sérénité. Découvrez clavier.dev." />
  <link rel="icon" type="image/png" href="/logo.png" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: {
              base: '#030305',
              surface: 'rgba(10, 11, 18, 0.7)',
              border: 'rgba(255, 255, 255, 0.06)',
            },
            cyber: {
              primary: '#6366f1', // Indigo
              secondary: '#a855f7', // Violet
              accent: '#14b8a6', // Turquoise d'action
            }
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
