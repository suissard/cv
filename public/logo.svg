<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- Dégradé brillant pour l'engrenage externe -->
    <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>

    <!-- Dégradé sombre pour le relief intérieur de l'engrenage -->
    <linearGradient id="gearDarkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>

    <!-- Dégradé subtil de fond pour le cerveau (effet de profondeur) -->
    <radialGradient id="brainBgGrad" cx="35%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f0f9ff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.4" />
    </radialGradient>

    <!-- Masque pour évider le centre de l'engrenage -->
    <mask id="gearMask">
      <rect x="150" y="30" width="500" height="300" fill="#ffffff" />
      <circle cx="410" cy="180" r="28" fill="#000000" />
    </mask>

    <!-- ClipPath pour séparer organiquement l'engrenage sur la droite du cerveau -->
    <clipPath id="gearClip">
      <path d="M 400,30 L 600,30 L 600,330 L 415,280 C 402,270 398,260 405,250 C 415,220 395,190 405,160 C 415,130 405,110 400,85 Z" />
    </clipPath>
  </defs>

  <!-- Arrière-plan transparent ou optionnel pour l'intégration -->
  <rect width="100%" height="100%" fill="none" />

  <g transform="translate(0, 5)">
    <!-- ================= PARTIE ENGRENEAGE (DROITE) ================= -->
    <g clip-path="url(#gearClip)" mask="url(#gearMask)">
      <!-- Corps principal de l'engrenage -->
      <circle cx="410" cy="180" r="85" fill="url(#gearGrad)" />
      
      <!-- Dents de l'engrenage (Rotations successives autour du centre) -->
      <g id="teeth" fill="url(#gearGrad)">
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(0 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(30 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(60 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(90 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(120 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(150 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(180 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(210 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(240 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(270 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(300 410 180)" />
        <path d="M 396,80 L 424,80 L 429,98 L 391,98 Z" transform="rotate(330 410 180)" />
      </g>

      <!-- Profondeur/Relief de l'engrenage -->
      <circle cx="410" cy="180" r="68" fill="url(#gearDarkGrad)" opacity="0.9" />
      <circle cx="410" cy="180" r="50" fill="url(#gearGrad)" />
    </g>

    <!-- ================= PARTIE CERVEAU (GAUCHE) ================= -->
    <!-- Fond du cerveau -->
    <path d="M 400,85 
             C 370,85 345,95 330,110 
             C 315,125 315,145 320,155 
             C 300,160 290,180 295,200 
             C 300,220 315,230 330,230 
             C 320,245 330,265 350,270 
             C 370,275 385,265 400,250 Z" 
          fill="url(#brainBgGrad)" />

    <!-- Réseau de neurones (Lignes de connexion) -->
    <g stroke="#0ea5e9" stroke-width="3" stroke-linecap="round" opacity="0.8">
      <line x1="355" y1="125" x2="380" y2="115" />
      <line x1="355" y1="125" x2="335" y2="160" />
      <line x1="355" y1="125" x2="365" y2="165" />
      <line x1="380" y1="115" x2="385" y2="155" />
      <line x1="365" y1="165" x2="385" y2="155" />
      <line x1="335" y1="160" x2="325" y2="200" />
      <line x1="335" y1="160" x2="365" y2="165" />
      <line x1="365" y1="165" x2="355" y2="205" />
      <line x1="385" y1="155" x2="385" y2="200" />
      <line x1="325" y1="200" x2="355" y2="205" />
      <line x1="355" y1="205" x2="385" y2="200" />
      <line x1="325" y1="200" x2="350" y2="245" />
      <line x1="355" y1="205" x2="350" y2="245" />
      <line x1="385" y1="200" x2="380" y2="240" />
      <line x1="350" y1="245" x2="380" y2="240" />
    </g>

    <!-- Halos lumineux sous les nœuds -->
    <g fill="#38bdf8" opacity="0.4">
      <circle cx="355" cy="125" r="10" />
      <circle cx="380" cy="115" r="10" />
      <circle cx="335" cy="160" r="10" />
      <circle cx="365" cy="165" r="10" />
      <circle cx="385" cy="155" r="10" />
      <circle cx="325" cy="200" r="10" />
      <circle cx="355" cy="205" r="10" />
      <circle cx="385" cy="200" r="10" />
      <circle cx="350" cy="245" r="10" />
      <circle cx="380" cy="240" r="10" />
    </g>

    <!-- Nœuds du réseau (Points bleus foncés) -->
    <g fill="#0f172a">
      <circle cx="355" cy="125" r="5.5" />
      <circle cx="380" cy="115" r="5.5" />
      <circle cx="335" cy="160" r="5.5" />
      <circle cx="365" cy="165" r="5.5" />
      <circle cx="385" cy="155" r="5.5" />
      <circle cx="325" cy="200" r="5.5" />
      <circle cx="355" cy="205" r="5.5" />
      <circle cx="385" cy="200" r="5.5" />
      <circle cx="350" cy="245" r="5.5" />
      <circle cx="380" cy="240" r="5.5" />
    </g>

    <!-- Contour extérieur du cerveau -->
    <path d="M 400,85 
             C 370,85 345,95 330,110 
             C 315,125 315,145 320,155 
             C 300,160 290,180 295,200 
             C 300,220 315,230 330,230 
             C 320,245 330,265 350,270 
             C 370,275 385,265 400,250" 
          fill="none" 
          stroke="#0f172a" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Plis internes pour structurer le cerveau -->
    <path d="M 335,160 C 345,180 340,210 355,205" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />
    <path d="M 370,140 C 360,150 365,180 385,185" fill="none" stroke="#0f172a" stroke-width="6" stroke-linecap="round" />

    <!-- Ligne de séparation/Fissure centrale (S-Curve) -->
    <path d="M 400,85 
             C 405,110 415,130 405,160 
             C 395,190 415,220 405,250 
             C 402,260 408,270 415,280" 
          fill="none" 
          stroke="#0f172a" 
          stroke-width="8" 
          stroke-linecap="round" />
  </g>

  <!-- ================= TYPOGRAPHIE (TEXTE) ================= -->
  <text x="400" y="415" 
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" 
        font-size="64" 
        font-weight="800" 
        text-anchor="middle" 
        letter-spacing="-1.5px">
    <tspan fill="#ffffff">clavier</tspan>
    <tspan fill="#0ea5e9">.dev_</tspan>
  </text>
</svg>
